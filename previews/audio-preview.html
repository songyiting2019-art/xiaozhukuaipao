<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小猪快跑音效预览</title>
    <style>
      :root {
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        background: #f6f3e9;
        color: #2b2418;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0)), #f6f3e9;
      }

      main {
        width: min(1080px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      header {
        display: grid;
        gap: 10px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 46px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: #6d604e;
        line-height: 1.65;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin: 18px 0 22px;
        padding: 12px;
        border: 1px solid rgba(78, 63, 39, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: #3d6f51;
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .secondary {
        background: #805f35;
      }

      label {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        color: #4f4435;
        font-weight: 800;
      }

      input[type="range"] {
        width: min(260px, 42vw);
        accent-color: #3d6f51;
      }

      .now-playing {
        min-height: 24px;
        color: #3d6f51;
        font-weight: 900;
      }

      .section {
        margin-top: 24px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(272px, 1fr));
        gap: 12px;
      }

      .sound-card {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        min-height: 148px;
        padding: 16px;
        border: 1px solid rgba(78, 63, 39, 0.13);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 10px 30px rgba(61, 47, 26, 0.07);
      }

      .sound-card.is-playing {
        outline: 3px solid rgba(67, 122, 88, 0.22);
      }

      .sound-copy {
        display: grid;
        gap: 7px;
      }

      .sound-name {
        margin: 0;
        font-size: 17px;
        line-height: 1.25;
      }

      .sound-file {
        color: #8a5b30;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .tag {
        width: fit-content;
        border-radius: 999px;
        padding: 4px 8px;
        background: #e7f0dc;
        color: #405832;
        font-size: 12px;
        font-weight: 800;
      }

      .tag.candidate {
        background: #f2ead7;
        color: #6c532a;
      }

      .tag.key {
        background: #f2dfdc;
        color: #823f35;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 20px, 1080px);
          padding-top: 18px;
        }

        .sound-card {
          grid-template-columns: 1fr;
        }

        .sound-card button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>小猪快跑音效预览</h1>
        <p>这里只试听带头冲锋和横冲直撞的真实小猪声音候选。还没接入游戏；播放时才加载音频。</p>
      </header>

      <div class="toolbar">
        <label>
          试听音量
          <input id="volumeControl" type="range" min="0" max="1" step="0.01" value="0.72" />
        </label>
        <button id="stopAllBtn" class="secondary" type="button">停止全部</button>
      </div>

      <p class="now-playing" id="nowPlaying" aria-live="polite"></p>

      <section class="section" aria-labelledby="currentTitle">
        <h2 id="currentTitle">带头冲锋候选</h2>
        <div class="grid" id="currentGrid"></div>
      </section>

      <section class="section" aria-labelledby="candidateTitle">
        <h2 id="candidateTitle">横冲直撞候选</h2>
        <div class="grid" id="candidateGrid"></div>
      </section>
    </main>

    <script>
      const sounds = [
        {
          group: "current",
          name: "带头冲锋 A：三下号召",
          file: "../assets/audio/preview/sfx-pig-skill-charge-triple-v2a.mp3",
          use: "点击使用带头冲锋时",
          feel: "三下短叫，像带头喊着冲",
          repeat: "候选未接入｜适合低频技能",
        },
        {
          group: "current",
          name: "带头冲锋 B：真实连鼻音",
          file: "../assets/audio/preview/sfx-pig-skill-charge-real-multi-v2b.mp3",
          use: "点击使用带头冲锋时",
          feel: "同一条真实素材里连续几下，更自然",
          repeat: "候选未接入｜比 A 更有动物感",
        },
        {
          group: "current",
          name: "带头冲锋 C：两下短叫",
          file: "../assets/audio/preview/sfx-pig-skill-charge-double-v2c.mp3",
          use: "点击使用带头冲锋时",
          feel: "两下就收，更短更克制",
          repeat: "候选未接入｜不容易吵",
        },
        {
          group: "candidate",
          name: "横冲直撞 A：短鼻音",
          file: "../assets/audio/preview/sfx-pig-skill-sidedash-snort-v1a.mp3",
          use: "点击使用横冲直撞时",
          feel: "很短的真实鼻音，轻快一点",
          repeat: "候选未接入｜适合低频技能",
        },
        {
          group: "candidate",
          name: "横冲直撞 B：喘一下",
          file: "../assets/audio/preview/sfx-pig-skill-sidedash-breath-v1b.mp3",
          use: "点击使用横冲直撞时",
          feel: "更像小猪蓄劲横冲前哼一下",
          repeat: "候选未接入｜比 A 更真实",
        },
      ];
      const players = new Map();
      let activePlayer = null;
      const volumeControl = document.querySelector("#volumeControl");
      const nowPlaying = document.querySelector("#nowPlaying");

      function createCard(sound) {
        const card = document.createElement("article");
        card.className = "sound-card";
        card.innerHTML = `
          <div class="sound-copy">
            <h3 class="sound-name">${sound.name}</h3>
            <span class="sound-file">${sound.file.replace("../", "")}</span>
            <p><strong>用途：</strong>${sound.use}</p>
            <p><strong>听感：</strong>${sound.feel}</p>
            <span class="tag ${sound.group === "candidate" ? "candidate" : sound.tag ?? ""}">${sound.repeat}</span>
          </div>
          <button type="button">播放</button>
        `;
        const button = card.querySelector("button");
        players.set(sound.file, { card, sound });

        button.addEventListener("click", () => {
          if (activePlayer?.sound === sound) {
            stopAll();
            return;
          }

          stopAll();
          const audio = new Audio(sound.file);
          audio.preload = "auto";
          audio.loop = sound.file.includes("bgm-");
          audio.volume = Number(volumeControl.value);
          activePlayer = { audio, card, sound };

          audio.addEventListener("ended", () => {
            card.classList.remove("is-playing");
            nowPlaying.textContent = "";
            if (activePlayer?.audio === audio) activePlayer = null;
          });

          audio.addEventListener("error", () => {
            card.classList.remove("is-playing");
            nowPlaying.textContent = "这个音频没加载出来，请刷新页面再试。";
            if (activePlayer?.audio === audio) activePlayer = null;
          });

          audio.play().catch(() => {
            nowPlaying.textContent = "播放被浏览器拦截，请再点一次播放。";
            if (activePlayer?.audio === audio) activePlayer = null;
          });
          card.classList.add("is-playing");
          nowPlaying.textContent = `正在播放：${sound.name}`;
        });

        return card;
      }

      function stopAll() {
        if (activePlayer) {
          activePlayer.audio.pause();
          activePlayer.audio.removeAttribute("src");
          activePlayer.audio.load();
          activePlayer = null;
        }
        players.forEach(({ card }) => {
          card.classList.remove("is-playing");
        });
        nowPlaying.textContent = "";
      }

      document.querySelector("#currentGrid").append(
        ...sounds.filter((sound) => sound.group === "current").map(createCard),
      );
      document.querySelector("#candidateGrid").append(
        ...sounds.filter((sound) => sound.group === "candidate").map(createCard),
      );

      volumeControl.addEventListener("input", () => {
        if (activePlayer) activePlayer.audio.volume = Number(volumeControl.value);
      });

      document.querySelector("#stopAllBtn").addEventListener("click", stopAll);
    </script>
  </body>
</html>
