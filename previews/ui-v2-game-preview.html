<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>小猪快跑二版游戏页预览</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #e8e8e8;
      }

      .preview-frame {
        display: block;
        width: min(100vw, 390px);
        height: 100dvh;
        margin: 0 auto;
        border: 0;
        background: #6ab54e;
      }

      .debug-controls {
        position: fixed;
        right: max(10px, env(safe-area-inset-right));
        bottom: max(10px, env(safe-area-inset-bottom));
        z-index: 10;
        display: flex;
        gap: 8px;
      }

      .debug-controls button {
        height: 32px;
        padding: 0 10px;
        border: 1px solid rgba(66, 46, 24, 0.28);
        border-radius: 999px;
        color: #4d3218;
        background: rgba(255, 246, 204, 0.9);
        font: 700 13px/1 "PingFang SC", system-ui, sans-serif;
      }

      .debug-controls button.is-on {
        color: #fff8dc;
        background: rgba(220, 65, 42, 0.9);
      }
    </style>
  </head>
  <body>
    <iframe
      class="preview-frame"
      id="gameFrame"
      src="../index.html?previewLevel=15&uiV2GameBg=farm-v7-shift-up-140-stretch-108"
      title="第15关实际游戏预览"
    ></iframe>
    <div class="debug-controls" aria-label="调试开关">
      <button class="is-on" id="outlineToggle" type="button">轮廓</button>
      <button id="gridToggle" type="button">网格</button>
    </div>
    <script>
      const frame = document.querySelector("#gameFrame");
      const outlineToggle = document.querySelector("#outlineToggle");
      const gridToggle = document.querySelector("#gridToggle");

      function injectPreviewSkin() {
        const doc = frame.contentDocument;
        if (!doc?.head) return;
        if (doc.querySelector("#uiV2GamePreviewSkin")) return;

        const style = doc.createElement("style");
        style.id = "uiV2GamePreviewSkin";
        style.textContent = `
          body {
            background: #6ab54e !important;
          }

          body::before,
          body::after {
            display: none !important;
          }

          .game-shell::before {
            position: absolute;
            inset: 0;
            z-index: 0;
            content: "";
            pointer-events: none;
            background:
              url("./assets/generated/game-bg-10x16-farm-v7-adjusted/game-bg-farm-v7-shift-up-140px-stretch-108.png?v=farm-v7-shift-up-140-stretch-108")
              center / 100% 100%
              no-repeat;
          }

          .pasture-shadow,
          .pasture::before,
          .pasture::after {
            display: none !important;
          }

          .pasture {
            background: transparent !important;
            box-shadow: none !important;
          }

          .pasture-wrap {
            transform: translateY(-20px);
          }

          body.ui-v2-debug-outline .pasture {
            outline: 2px solid rgba(255, 39, 39, 0.9);
            outline-offset: 0;
          }

          body.ui-v2-debug-grid .pasture::before {
            position: absolute;
            inset: 0;
            z-index: 0;
            display: block !important;
            border-radius: inherit;
            content: "";
            pointer-events: none;
            background:
              repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.26) 0 1px,
                transparent 1px calc(100% / var(--board-cols))
              ),
              repeating-linear-gradient(
                0deg,
                rgba(255, 255, 255, 0.26) 0 1px,
                transparent 1px calc(100% / var(--board-rows))
              );
          }
        `;
        doc.head.appendChild(style);
        doc.body.classList.toggle("ui-v2-debug-outline", outlineToggle.classList.contains("is-on"));
        doc.body.classList.toggle("ui-v2-debug-grid", gridToggle.classList.contains("is-on"));
      }

      frame.addEventListener("load", injectPreviewSkin);

      function toggleDebug(button, className) {
        button.classList.toggle("is-on");
        const doc = frame.contentDocument;
        doc?.body?.classList.toggle(className, button.classList.contains("is-on"));
      }

      outlineToggle.addEventListener("click", () => toggleDebug(outlineToggle, "ui-v2-debug-outline"));
      gridToggle.addEventListener("click", () => toggleDebug(gridToggle, "ui-v2-debug-grid"));
    </script>
  </body>
</html>
