<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小猪出栏 - 第一关</title>
    <link rel="stylesheet" href="./styles.css?v=clean-mobile-assets-1" />
  </head>
  <body class="is-starting">
    <main class="game-shell">
      <section class="start-screen" id="startScreen" aria-labelledby="startTitle">
        <div class="start-card">
          <div class="start-badge">农场闯关</div>
          <h1 id="startTitle">小猪快跑</h1>
          <p class="start-copy">点小猪，拆开阻挡，把它们送回农场小屋。</p>
          <div class="start-stats" aria-label="玩家进度">
            <div>
              <span class="start-stat-label">总星数</span>
              <strong class="start-stat-value"><span id="startTotalStars">0</span><span class="start-stat-unit">★</span></strong>
            </div>
            <div>
              <span class="start-stat-label">已通关</span>
              <strong class="start-stat-value"><span id="startClearedLevels">0</span><span class="start-stat-unit">关</span></strong>
            </div>
          </div>
          <button class="start-button" id="startGameBtn" type="button">开始游戏</button>
        </div>
      </section>

      <section class="hud" aria-label="关卡状态">
        <button class="icon-button" id="restartBtn" aria-label="重新开始" title="重新开始">
          <span aria-hidden="true">↻</span>
        </button>
        <div class="status-pill">
          <span class="grass-icon" aria-hidden="true"></span>
          <strong id="clearedCount">0</strong>
          <span id="targetCount">/ 0</span>
        </div>
        <div class="level-select-wrap">
          <select class="level-select" id="levelSelect" aria-label="选择关卡"></select>
          <span class="level-select-label" id="levelSelectLabel" aria-hidden="true">第1关</span>
        </div>
        <div class="score-pill">
          <span>分</span>
          <strong id="scoreCount">0</strong>
          <span class="score-target" id="starTarget">3★ 0</span>
        </div>
        <div class="total-stars-pill" aria-label="总星数">
          <span>★</span>
          <strong id="totalStarsCount">0</strong>
        </div>
        <div class="level-title" id="levelTitle">第1关</div>
      </section>

      <section class="pasture-wrap" aria-label="小猪游玩区">
        <div class="pasture-shadow"></div>
        <div class="pasture" id="pasture"></div>
        <div class="combo-burst" id="comboBurst" aria-live="polite">
          <span class="combo-fire-ring" aria-hidden="true"></span>
          <strong id="comboCount">0</strong>
        </div>
      </section>

      <section class="tool-row" aria-label="道具">
        <button class="tool-card" id="removeTool" type="button">
          <span class="tool-pig" aria-hidden="true"></span>
          <span>移除</span>
          <small class="tool-count">1/1</small>
        </button>
        <button class="tool-card" id="undoTool" type="button">
          <span class="tool-undo-icon" aria-hidden="true">↶</span>
          <span>撤销</span>
          <small class="tool-count">2/2</small>
        </button>
      </section>

      <section class="level-complete-modal" id="levelCompleteModal" aria-modal="true" role="dialog" aria-labelledby="completeTitle" hidden>
        <div class="level-complete-panel">
          <h2 id="completeTitle">通关</h2>
          <div class="complete-stars" id="completeStars" aria-label="本关星级">☆☆☆</div>
          <div class="complete-score" id="completeScore">0分</div>
          <div class="complete-actions">
            <button class="complete-button" id="replayLevelBtn" type="button">重玩本关</button>
            <button class="complete-button is-primary" id="nextLevelBtn" type="button">下一关</button>
          </div>
        </div>
      </section>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>

    <script src="./game.js?v=stun-orbit-3"></script>
  </body>
</html>
