<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小猪出栏 - 第一关</title>
    <link rel="stylesheet" href="./styles.css?v=board-10x16-v1" />
  </head>
  <body class="is-starting">
    <main class="game-shell">
      <section class="start-screen" id="startScreen" aria-labelledby="startTitle">
        <div class="start-card">
          <img class="start-hero-image" src="./assets/optimized/home-selected-level-flag-mobile.jpg" alt="" />
          <h1 class="visually-hidden" id="startTitle">小猪快跑</h1>
          <button class="start-collection-button" id="startStarsButton" type="button">收藏馆</button>
          <button class="sound-toggle start-sound-toggle" type="button" data-sound-toggle aria-label="关闭音效" aria-pressed="true" title="关闭音效">
            <span aria-hidden="true">♪</span>
          </button>
          <div class="start-stats" aria-label="玩家进度">
            <button class="start-stat-card start-stars-card" id="startStarsStatButton" type="button" aria-label="查看收藏馆">
              <span class="start-stat-label">总星数</span>
              <strong class="start-stat-value"><span id="startTotalStars">0</span><span class="start-stat-unit">星</span></strong>
              <span class="unlock-badge start-unlock-badge" id="startUnlockBadge" hidden>新</span>
            </button>
            <div class="start-stat-card">
              <span class="start-stat-label">已通关</span>
              <strong class="start-stat-value"><span id="startClearedLevels">0</span><span class="start-stat-unit">关</span></strong>
            </div>
          </div>
          <button class="start-button" id="startGameBtn" type="button" aria-label="开始游戏">开始游戏</button>
        </div>
      </section>

      <section class="hud" aria-label="关卡状态">
        <div class="hud-actions">
          <button class="icon-button" id="homeBtn" aria-label="返回主页" title="返回主页">
            <span aria-hidden="true">⌂</span>
          </button>
          <button class="icon-button" id="restartBtn" aria-label="重新开始" title="重新开始">
            <span aria-hidden="true">↻</span>
          </button>
          <button class="icon-button sound-toggle game-sound-toggle" type="button" data-sound-toggle aria-label="关闭音效" aria-pressed="true" title="关闭音效">
            <span aria-hidden="true">♪</span>
          </button>
        </div>
        <div class="status-pill">
          <span class="grass-icon" aria-hidden="true"></span>
          <strong id="clearedCount">0</strong>
          <span id="targetCount">/ 0</span>
        </div>
        <div class="level-select-wrap">
          <select class="level-select" id="levelSelect" aria-label="选择关卡"></select>
          <span class="level-select-label" id="levelSelectLabel" aria-hidden="true">第1关</span>
        </div>
        <div class="score-pill" aria-label="本局得分">
          <span>得分</span>
          <strong id="scoreCount">0</strong>
          <span class="score-target" id="starTarget">3★ 0</span>
        </div>
        <button class="total-stars-pill" id="totalStarsButton" type="button" aria-label="查看收藏馆">
          <span>★</span>
          <strong id="totalStarsCount">0</strong>
        </button>
        <div class="level-title" id="levelTitle">第1关</div>
      </section>

      <section class="pasture-wrap" aria-label="小猪游玩区">
        <div class="pasture-shadow"></div>
        <div class="pasture" id="pasture"></div>
        <div class="combo-burst" id="comboBurst" aria-live="polite">
          <span class="combo-fire-ring" aria-hidden="true"></span>
          <strong id="comboCount">0</strong>
        </div>
        <button class="firecracker-button" id="firecrackerTool" type="button" aria-label="使用炮仗" hidden>
          <span class="firecracker-icon" aria-hidden="true"></span>
          <small>炮仗</small>
        </button>
        <div class="firecracker-effect" id="firecrackerEffect" aria-hidden="true" hidden>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>

      <section class="tool-row" aria-label="道具">
        <button class="tool-card" id="removeTool" type="button">
          <span class="tool-pig" aria-hidden="true"></span>
          <span>移除</span>
          <small class="tool-count">1次</small>
        </button>
        <button class="tool-card flip-tool" id="flipTool" type="button" hidden>
          <span class="tool-flip" aria-hidden="true">↺</span>
          <span>翻转</span>
          <small class="tool-count">1次</small>
        </button>
        <button class="tool-card stimulant-tool" id="stimulantTool" type="button" hidden>
          <span class="tool-stimulant" aria-hidden="true">⚡</span>
          <span>兴奋剂</span>
          <small class="tool-count">1次</small>
        </button>
        <button class="tool-card side-dash-tool" id="sideDashTool" type="button" hidden>
          <span class="tool-side-dash" aria-hidden="true">↔</span>
          <span>横冲</span>
          <small class="tool-count">1次</small>
        </button>
        <button class="tool-card lead-charge-tool" id="leadChargeTool" type="button" hidden>
          <span class="tool-lead-charge" aria-hidden="true">▶</span>
          <span>带头</span>
          <small class="tool-count">1次</small>
        </button>
      </section>

      <section class="level-complete-modal" id="levelCompleteModal" aria-modal="true" role="dialog" aria-labelledby="completeTitle" hidden>
        <div class="level-complete-panel">
          <h2 id="completeTitle">通关</h2>
          <div class="complete-stars" id="completeStars" aria-label="本关星级">☆☆☆</div>
          <div class="complete-score" id="completeScore">0分</div>
          <button class="complete-unlock-notice" id="completeUnlockNotice" type="button" hidden>
            有新内容可解锁
          </button>
          <div class="complete-actions">
            <button class="complete-button" id="replayLevelBtn" type="button">重玩本关</button>
            <button class="complete-button is-primary" id="nextLevelBtn" type="button">下一关</button>
          </div>
        </div>
      </section>

      <section class="tool-unlock-modal" id="toolUnlockModal" aria-modal="true" role="dialog" aria-labelledby="toolUnlockTitle" hidden>
        <div class="tool-unlock-panel">
          <button class="modal-close-button" id="closeToolUnlockBtn" type="button" aria-label="关闭">×</button>
          <h2 id="toolUnlockTitle">收藏馆</h2>
          <div class="tool-unlock-stars">
            <span>当前星数</span>
            <strong id="toolUnlockStarCount">0★</strong>
          </div>
          <div class="collection-tabs" aria-label="收藏分类">
            <button class="collection-tab is-active" type="button" data-filter="all">全部</button>
            <button class="collection-tab" type="button" data-filter="tool">道具</button>
            <button class="collection-tab" type="button" data-filter="ability">能力</button>
            <button class="collection-tab" type="button" data-filter="skin">皮肤</button>
          </div>
          <p class="collection-rule" id="collectionRule"></p>
          <div class="tool-unlock-list" id="toolUnlockList"></div>
          <div class="tool-guide" id="toolGuide" aria-live="polite">
            <strong id="toolGuideTitle">选择道具</strong>
            <small id="toolGuideMeta">点击一个格子查看说明。</small>
            <p id="toolGuideText">点击一个道具查看使用说明。</p>
            <button class="collection-action" id="collectionActionBtn" type="button" hidden>使用</button>
          </div>
          <div class="collection-reveal" id="collectionReveal" aria-live="polite" hidden>
            <div class="collection-reveal-card">
              <span class="collection-reveal-light" aria-hidden="true"></span>
              <div class="collection-reveal-icon" id="collectionRevealIcon" aria-hidden="true"></div>
              <strong id="collectionRevealName">新道具</strong>
              <small id="collectionRevealMeta">已解锁</small>
              <button class="collection-reveal-close" id="collectionRevealClose" type="button">收下</button>
            </div>
          </div>
        </div>
      </section>

    </main>

    <script src="./board-core.js?v=board-10x16-v1"></script>
    <script src="./levels.js?v=levels-50-10x16-v1"></script>
    <script src="./game.js?v=fresh-start-10x16-v1"></script>
  </body>
</html>
